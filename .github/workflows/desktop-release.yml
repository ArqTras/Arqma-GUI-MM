# Desktop release: Flutter (zip / DMG / tar.gz / AppImage / Inno Setup) + Tauri (bundled installers),
# then **one** GitHub Release with all assets. Artifact names use pubspec semver before `+` (e.g. 5.1.0+1 → 5.1.0), matching release tag `5.1.0` or `v5.1.0`.
#
# Before first public release: `gh repo edit <owner>/<repo> --visibility public`
# After CI finishes, make private again: set secret `ARQMA_REPO_VISIBILITY_PAT` (repo admin) or
# `gh repo edit <owner>/<repo> --visibility private`
name: Desktop release (Flutter + Tauri)

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag recommended: 5.1.0 or v5.1.0 — must exist on remote)"
        required: true
        default: "5.1.0"
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ARQMA_WALLET2_UPSTREAM_DIR: ${{ github.workspace }}/rust/arqma-rpc-upstream

jobs:
  flutter-macos:
    name: macOS Flutter bundle
    runs-on: macos-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Pubspec semver for release filenames (matches tag, e.g. 5.1.0)
        id: pubver
        working-directory: ${{ github.workspace }}
        run: |
          LINE=$(grep -m1 '^version:' flutter/arqma_wallet_gui/pubspec.yaml | sed 's/^version:[[:space:]]*//;s/[[:space:]]*$//')
          SAFE="${LINE%%+*}"
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"
          echo "VersionSafe=${SAFE}"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-release-macos

      - uses: dtolnay/rust-toolchain@stable

      - name: macOS — Homebrew (Arqma / wallet FFI)
        working-directory: ${{ github.workspace }}
        run: |
          brew install cmake pkg-config boost openssl libsodium zeromq unbound readline hidapi icu4c lmdb xz 2>/dev/null || true

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (macOS)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-macos.sh

      - name: Build Arqma daemon (arqmad) and copy to Tauri bin
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-daemon-copy.sh

      - name: cargo build — arqma-wallet-flutter-ffi (release)
        working-directory: rust
        run: cargo build -p arqma-wallet-flutter-ffi --release

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Ensure wallet FFI dylib in macOS app bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          APP="flutter/arqma_wallet_gui/build/macos/Build/Products/Release/Arqma-Wallet.app"
          FW="${APP}/Contents/Frameworks"
          DY="${FW}/libarqma_wallet_flutter_ffi.dylib"
          if test -f "$DY"; then echo "FFI dylib already present: $DY"; exit 0; fi
          mkdir -p "$FW"
          SRC="${GITHUB_WORKSPACE}/rust/target/release/libarqma_wallet_flutter_ffi.dylib"
          test -f "$SRC" || { echo "::error::missing $SRC (cargo build arqma-wallet-flutter-ffi)"; exit 1; }
          cp -f "$SRC" "$DY"
          echo "Copied FFI dylib -> $DY"

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Arqma-Wallet.app "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.zip"

      - name: DMG (macOS)
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          APP="flutter/arqma_wallet_gui/build/macos/Build/Products/Release/Arqma-Wallet.app"
          test -d "$APP"
          hdiutil create -volname "Arqma Wallet (Flutter)" -srcfolder "$APP" -ov -format UDZO "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.dmg"
          ls -la "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.dmg"

      - uses: actions/upload-artifact@v6
        with:
          name: Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos
          path: |
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.zip
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.dmg
          retention-days: 30

  flutter-linux:
    name: Linux Flutter bundle
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Pubspec semver for release filenames (matches tag, e.g. 5.1.0)
        id: pubver
        working-directory: ${{ github.workspace }}
        run: |
          LINE=$(grep -m1 '^version:' flutter/arqma_wallet_gui/pubspec.yaml | sed 's/^version:[[:space:]]*//;s/[[:space:]]*$//')
          SAFE="${LINE%%+*}"
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"
          echo "VersionSafe=${SAFE}"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-release-linux

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux — dependencies (Arqma + Flutter desktop)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            libgtk-3-dev \
            liblzma-dev \
            libboost-all-dev \
            libssl-dev \
            libzmq3-dev \
            libsodium-dev \
            libhidapi-dev \
            libunbound-dev \
            libreadline-dev \
            liblmdb-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            libicu-dev \
            file \
            desktop-file-utils \
            squashfs-tools

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (Linux)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-linux.sh

      - name: Build Arqma daemon (arqmad) and copy to Tauri bin
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-daemon-copy.sh

      - name: cargo build — arqma-wallet-flutter-ffi (release)
        working-directory: rust
        run: cargo build -p arqma-wallet-flutter-ffi --release

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Ensure wallet FFI .so in Linux bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          lib="${b}/lib/libarqma_wallet_flutter_ffi.so"
          if test -f "$lib"; then echo "FFI .so already present: $lib"; exit 0; fi
          mkdir -p "${b}/lib"
          SRC="${GITHUB_WORKSPACE}/rust/target/release/libarqma_wallet_flutter_ffi.so"
          test -f "$SRC" || { echo "::error::missing $SRC"; exit 1; }
          cp -f "$SRC" "$lib"
          echo "Copied FFI .so -> $lib"

      - name: Tar bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          test -d "$b"
          tar -C "$b" -czf "Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-linux-x64.tar.gz" .

      - name: AppImage (Linux)
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          chmod +x build/ci/flutter-linux-bundle-to-appimage.sh
          bash build/ci/flutter-linux-bundle-to-appimage.sh \
            "flutter/arqma_wallet_gui/build/linux/x64/release/bundle" \
            "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-x86_64.AppImage"

      - uses: actions/upload-artifact@v6
        with:
          name: Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-linux-x64
          path: |
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-linux-x64.tar.gz
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-x86_64.AppImage
          retention-days: 30

  flutter-windows:
    name: Windows Flutter bundle
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Pubspec semver for release filenames (matches tag, e.g. 5.1.0)
        id: pubver
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $line = (Select-String -Path "flutter/arqma_wallet_gui/pubspec.yaml" -Pattern '^version:\s*(\S+)').Matches[0].Groups[1].Value
          $safe = $line -replace '\+.*', ''
          "safe=$safe" >> $env:GITHUB_OUTPUT
          Write-Host "VersionSafe=$safe"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-release-windows

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust GNU target (Windows)
        run: rustup target add x86_64-pc-windows-gnu

      - name: MSYS2 / MinGW64 (Windows)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-hidapi
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-unbound
            mingw-w64-x86_64-lmdb
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libunwind
            git

      - name: Export Node directory for MSYS2 (Windows)
        shell: pwsh
        run: |
          $dir = Split-Path -Parent (Get-Command node).Source
          Add-Content -Path $env:GITHUB_ENV -Value "ARQMA_CI_WINDOWS_NODE_DIR=$dir"

      - name: Make CI scripts executable
        shell: bash
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (Windows MinGW)
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}
        run: |
          export ARQMA_WALLET2_UPSTREAM_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/rust/arqma-rpc-upstream"
          bash "$(cygpath -u "$GITHUB_WORKSPACE")/build/ci/build-arqma-mingw.sh"

      - name: Fetch Arqma arqmad.exe for Flutter bundle (bin — arqmad only)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh -File build/ci/flutter-windows-fetch-arqma-binaries.ps1

      - name: cargo build — arqma-wallet-flutter-ffi (Windows GNU)
        working-directory: rust
        shell: pwsh
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
        run: |
          $root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($root)) { $root = "C:\msys64" }
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          $env:Path = "$nodeDir;$root\mingw64\bin;$root\usr\bin;" + $env:Path
          $env:ARQMA_WALLET2_MSYS_ROOT = "$root\mingw64"
          $env:ARQMA_MINGW_BIN = "$root\mingw64\bin"
          $env:ARQMA_WALLET2_UPSTREAM_DIR = "${{ github.workspace }}\rust\arqma-rpc-upstream"
          cargo build -p arqma-wallet-flutter-ffi --release --target x86_64-pc-windows-gnu

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows
        env:
          ARQMA_WALLET2_MSYS_ROOT: ${{ steps.msys2.outputs.msys2-location }}\mingw64
        run: flutter build windows --release

      - name: Ensure wallet FFI DLL and MinGW runtime under Release/lib
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($root)) { $root = "C:\msys64" }
          $mingwBin = Join-Path $root "mingw64\bin"
          $rel = "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $lib = Join-Path $rel "lib"
          New-Item -Force -ItemType Directory -Path $lib | Out-Null
          $dll = Join-Path $lib "arqma_wallet_flutter_ffi.dll"
          if (-not (Test-Path $dll)) {
            $src = "rust/target/x86_64-pc-windows-gnu/release/arqma_wallet_flutter_ffi.dll"
            if (-not (Test-Path $src)) { throw "missing FFI build output: $src" }
            Copy-Item -Force $src $dll
            Write-Host "Copied FFI DLL -> $dll"
          } else {
            Write-Host "FFI DLL already present: $dll"
          }
          foreach ($n in @('libgcc_s_seh-1.dll','libstdc++-6.dll','libwinpthread-1.dll')) {
            $src = Join-Path $mingwBin $n
            if (-not (Test-Path $src)) { Write-Host "::warning::missing MinGW runtime: $src"; continue }
            Copy-Item -Force $src $lib
            Write-Host "Copied $n -> $lib"
          }
          # Match flutter/arqma_wallet_gui/windows/cmake/install_arqma_wallet_ffi.cmake.in
          $patterns = @(
            'libboost_*.dll','libcrypto*.dll','libssl*.dll','libsodium*.dll','libhidapi*.dll',
            'libunbound*.dll','libicu*.dll','libldns*.dll','libevent*.dll','libnghttp*.dll',
            'libcares*.dll','libexpat*.dll','libsqlite3*.dll','libgmp*.dll',
            'libzstd*.dll','zlib1.dll','libbz2*.dll','liblzma*.dll','libxml2*.dll','libiconv*.dll',
            'libzmq*.dll','liblmdb*.dll','libunwind*.dll','libreadline*.dll','libhistory*.dll',
            'libtermcap*.dll','libncurses*.dll','libncursesw*.dll','libintl*.dll','libffi*.dll',
            'libssp*.dll','liblz4*.dll','libbrotli*.dll','libdeflate*.dll','libatomic*.dll'
          )
          foreach ($pat in $patterns) {
            Get-ChildItem -Path "$mingwBin\$pat" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch '^libboost_python' -and $_.Name -notmatch '^libboost_numpy' } |
              ForEach-Object { Copy-Item -Force $_.FullName $lib; Write-Host "Copied $($_.Name) -> $lib" }
          }

      - name: Sync daemon into Flutter Release + verify bundle (local script parity)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          node build/copy-to-tauri-bins.js
          $rel = Join-Path $env:GITHUB_WORKSPACE "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          $src = Join-Path $env:GITHUB_WORKSPACE "rust/tauri-app/src-tauri/bin"
          New-Item -Force -ItemType Directory -Path (Join-Path $rel "bin") | Out-Null
          foreach ($e in @("arqmad.exe", "arqma_flutter_solo_pool.exe")) {
            $p = Join-Path $src $e
            if (Test-Path $p) {
              Copy-Item -Force $p (Join-Path $rel "bin/$e")
              Write-Host "Synced $e -> $rel/bin/"
            }
          }
          $verify = Join-Path $env:GITHUB_WORKSPACE "flutter/arqma_wallet_gui/tool/verify_windows_bundle.ps1"
          if (-not (Test-Path $verify)) { throw "missing verify script: $verify (commit flutter/arqma_wallet_gui/tool/verify_windows_bundle.ps1)" }
          pwsh -File $verify -ReleaseDir $rel -FailIfNoArqmad

      - name: Zip Release layout
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $safe = "${{ steps.pubver.outputs.safe }}"
          $zip = Join-Path $env:GITHUB_WORKSPACE "Arqma-Wallet-Flutter-${safe}-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item -Force $zip }
          Compress-Archive -Path (Join-Path $rel "*") -DestinationPath $zip -Force
          Write-Host "Packaged: $zip"

      - name: Inno Setup installer (Windows)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y --no-progress
          $rel = Join-Path $pwd "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $line = (Select-String -Path "flutter/arqma_wallet_gui/pubspec.yaml" -Pattern '^version:\s*(\S+)').Matches[0].Groups[1].Value
          $ver = $line -replace '\+.*',''
          $safe = $line -replace '\+.*', ''
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "missing ISCC: $iscc" }
          & $iscc "build\ci\flutter-windows-installer.iss" "/DMyAppVersion=$ver" "/DVersionSafe=$safe" "/DSrcRelease=$rel"
          $setup = Join-Path $pwd "Arqma-Wallet-Flutter-${safe}-windows-x64-Setup.exe"
          if (-not (Test-Path $setup)) { throw "missing $setup" }
          Get-Item $setup | Format-List *

      - uses: actions/upload-artifact@v6
        with:
          name: Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-windows-x64
          path: |
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-windows-x64.zip
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-windows-x64-Setup.exe
          retention-days: 30

  tauri:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Cargo (workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust GNU target (Windows native wallet2)
        if: matrix.os == 'windows-latest'
        run: rustup target add x86_64-pc-windows-gnu

      - name: MSYS2 / MinGW64 (Windows, Arqma native libs)
        id: msys2
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-hidapi
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-unbound
            mingw-w64-x86_64-lmdb
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libunwind
            git

      # setup-node updates PATH for pwsh/cmd, but MSYS2 bash starts with a minimal PATH — export the
      # resolved Node directory so build-arqma-mingw.sh can prepend it before `node` (patch scripts).
      - name: Export Node directory for MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dir = Split-Path -Parent (Get-Command node).Source
          Add-Content -Path $env:GITHUB_ENV -Value "ARQMA_CI_WINDOWS_NODE_DIR=$dir"

      - name: Linux — dependencies (Tauri WebKit + Arqma build)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            cmake \
            pkg-config \
            libboost-all-dev \
            libssl-dev \
            libzmq3-dev \
            libsodium-dev \
            libhidapi-dev \
            libunbound-dev \
            liblzma-dev \
            libreadline-dev \
            liblmdb-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            libicu-dev

      - name: macOS — Homebrew (Arqma build)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake pkg-config boost openssl libsodium zeromq unbound readline hidapi icu4c lmdb xz 2>/dev/null || true

      - name: Make CI scripts executable
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: bash build/ci/build-arqma-linux.sh

      - name: Build Arqma wallet_merged (macOS)
        if: matrix.os == 'macos-latest'
        run: bash build/ci/build-arqma-macos.sh

      - name: Build Arqma wallet_merged (Windows MinGW)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          export ARQMA_WALLET2_UPSTREAM_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/rust/arqma-rpc-upstream"
          bash "$(cygpath -u "$GITHUB_WORKSPACE")/build/ci/build-arqma-mingw.sh"

      - name: Download Arqma binaries (daemon / wallet-rpc)
        run: node ./build/download-binaries.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -xvf "${{ github.workspace }}/downloads/latest.gz" --directory "${{ github.workspace }}"
          ls -la "${{ github.workspace }}/bin" || true

      - name: Extract archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\bin" | Out-Null
          tar -xvf "${{ github.workspace }}\downloads\latest.zip" -C "${{ github.workspace }}\bin" arqmad.exe
          Get-ChildItem "${{ github.workspace }}\bin"

      - name: Extract archive (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p bin
          unzip -o downloads/latest.zip -d bin
          ls -la bin

      - name: Copy binaries into src-tauri/bin
        run: node build/copy-to-tauri-bins.js

      - name: npm install + Vite + Tauri (Linux / macOS)
        if: matrix.os != 'windows-latest'
        working-directory: rust/tauri-app
        run: |
          npm install
          npm run ci:tauri
        env:
          ARQMA_WALLET2_UPSTREAM_DIR: ${{ env.ARQMA_WALLET2_UPSTREAM_DIR }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm install + Vite + Tauri (Windows, GNU target)
        if: matrix.os == 'windows-latest'
        working-directory: rust/tauri-app
        shell: pwsh
        run: |
          # MSYS2 may ship `node` in mingw64\bin — if it appears before GitHub-hosted Node,
          # @tauri-apps/cli loads the wrong native addon. Force PATH: Node (setup-node) first, then MinGW.
          $root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($root)) { $root = "C:\msys64" }
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          $env:Path = "$nodeDir;$root\mingw64\bin;$root\usr\bin;" + $env:Path
          $env:ARQMA_WALLET2_MSYS_ROOT = "$root\mingw64"
          $env:ARQMA_MINGW_BIN = "$root\mingw64\bin"
          $env:ARQMA_WALLET2_UPSTREAM_DIR = "${{ github.workspace }}\rust\arqma-rpc-upstream"
          npm install
          npm run ci:tauri:native:windows-gnu
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Tauri bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Tauri-bundle-${{ matrix.os }}
          path: |
            rust/target/release/bundle/**/*.AppImage
            rust/target/release/bundle/**/*.deb
            rust/target/release/bundle/**/*.snap
            rust/target/release/bundle/**/Arqma Wallet*.exe
            rust/target/release/bundle/**/*.msi
            rust/target/release/bundle/**/*.dmg
            rust/target/release/bundle/**/*.app.tar.gz
            rust/target/x86_64-pc-windows-gnu/release/bundle/**/Arqma Wallet*.exe
            rust/target/x86_64-pc-windows-gnu/release/bundle/**/*.msi
            rust/target/x86_64-pc-windows-gnu/release/bundle/**/*.nsis.zip
          if-no-files-found: ignore

  publish-release:
    name: GitHub Release (Flutter + Tauri)
    needs: [flutter-macos, flutter-linux, flutter-windows, tauri]
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          set -eu
          find artifacts -type f | head -200 || true
          echo "---"

      - name: Collect files for GitHub Release
        run: |
          set -eu
          mkdir -p upload
          find artifacts -type f \( \
            -name '*.zip' -o -name '*.tar.gz' -o -name '*.dmg' \
            -o -name '*.AppImage' -o -name 'Arqma-Wallet-Flutter-*-windows-x64-Setup.exe' \
            -o -name '*.deb' -o -name '*.snap' -o -name '*.msi' \
            -o -name '*.exe' -o -name '*.nsis.zip' \
            \) -exec cp -f {} upload/ \;
          ls -la upload/
          n=$(find upload -type f | wc -l | tr -d ' ')
          if [ "$n" -lt 1 ]; then
            echo "::error::No release files collected from artifacts/"
            find artifacts -type f | head -150 || true
            exit 1
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
          name: Arqma Wallet ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: upload/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  repo-private-after-release:
    name: Repository private (optional PAT)
    needs: publish-release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Set repository to private
        env:
          GH_TOKEN: ${{ secrets.ARQMA_REPO_VISIBILITY_PAT }}
        run: |
          set -eu
          if [ -z "${GH_TOKEN:-}" ]; then
            echo '::notice::Secret ARQMA_REPO_VISIBILITY_PAT not set — skipping visibility change. Run: gh repo edit ${{ github.repository }} --visibility private'
            exit 0
          fi
          gh api -X PATCH "repos/${{ github.repository }}" -f visibility=private
          gh repo view "${{ github.repository }}" --json visibility,isPrivate
