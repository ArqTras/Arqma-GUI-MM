# Desktop release: Flutter only (macOS zip/DMG, Linux tar.gz/AppImage, Windows zip/Inno Setup).
# Push to branch `main` builds all platforms and uploads Actions artifacts (no GitHub Release).
# Tags / workflow_dispatch with a release tag still publish to GitHub Releases.
# Wallet FFI + solo pool: Latest ArqTras/FFI (resolve-arqma-ffi-release-version.*; pin with ARQMA_FFI_RELEASE_VERSION).
# arqmad: latest https://github.com/arqma/arqma release (not built from source in CI).
# Solo pool: desktop only (Windows, Linux, macOS). Android/iOS do not include solo pool.
#
# Before first public release: `gh repo edit <owner>/<repo> --visibility public`
# After CI finishes, make private again: set secret `ARQMA_REPO_VISIBILITY_PAT` (repo admin) or
# `gh repo edit <owner>/<repo> --visibility private`
name: Desktop release (Flutter)

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch or tag: main, 5.1.0, v5.1.0)"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ARQMA_FFI_REPO: ArqTras/FFI
  ARQMA_FFI_RELEASE_VERSION: "latest"

jobs:
  flutter-macos:
    name: macOS Flutter bundle
    runs-on: macos-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - name: Checkout repository (public unauthenticated)
        working-directory: ${{ github.workspace }}
        shell: bash
        env:
          CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
        run: |
          set -euo pipefail
          REF="${CHECKOUT_REF}"
          if [[ "${REF}" != refs/heads/* && "${REF}" != refs/tags/* ]]; then
            if git ls-remote --exit-code "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${REF}" >/dev/null 2>&1; then
              REF="refs/tags/${REF}"
            else
              REF="refs/heads/${REF}"
            fi
          fi
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init "${GITHUB_WORKSPACE}"
          git -C "${GITHUB_WORKSPACE}" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "${GITHUB_WORKSPACE}" -c protocol.version=2 fetch --depth 1 origin "${REF}"
          git -C "${GITHUB_WORKSPACE}" checkout -f FETCH_HEAD

      - name: Pubspec version slug (release artifacts)
        id: pubver
        working-directory: ${{ github.workspace }}
        run: |
          LINE=$(grep -m1 '^version:' flutter/arqma_wallet_gui/pubspec.yaml | sed 's/^version:[[:space:]]*//;s/[[:space:]]*$//')
          SAFE=$(echo "$LINE" | tr '+ ' '--')
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"
          echo "VersionSafe=${SAFE}"

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Resolve ArqTras/FFI release
        id: ffi_release
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER=$(bash build/ci/resolve-arqma-ffi-release-version.sh)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Using ArqTras/FFI release ${VER}"

      - name: Fetch wallet FFI (ArqTras/FFI, macOS)
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARQMA_FFI_REPO: ArqTras/FFI
          ARQMA_FFI_PLATFORMS: macos-arm64
        run: bash build/ci/fetch-arqma-wallet-ffi-release-linux.sh

      - name: Fetch arqmad (arqma/arqma latest release)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash build/ci/fetch-arqmad-github-release.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch solo pool sidecar (ArqTras/FFI, macOS)
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARQMA_FFI_REPO: ArqTras/FFI
          ARQMA_SOLO_POOL_PLATFORMS: macos-arm64
        run: bash build/ci/fetch-arqma-wallet-solo-pool-release-linux.sh

      - name: Install Flutter (pinned)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: bash build/ci/setup-flutter-stable-ci.sh

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Ensure wallet FFI dylib in macOS app bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          APP="flutter/arqma_wallet_gui/build/macos/Build/Products/Release/Arqma-Wallet.app"
          FW="${APP}/Contents/Frameworks"
          DY="${FW}/libarqma_wallet_flutter_ffi.dylib"
          if test -f "$DY"; then echo "FFI dylib already present: $DY"; exit 0; fi
          mkdir -p "$FW"
          SRC="${GITHUB_WORKSPACE}/rust/target/release/libarqma_wallet_flutter_ffi.dylib"
          test -f "$SRC" || { echo "::error::missing $SRC (fetch ArqTras/FFI prebuilt)"; exit 1; }
          cp -f "$SRC" "$DY"
          echo "Copied FFI dylib -> $DY"

      - name: Sync arqmad + solo pool into macOS bundle + verify
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          APP="flutter/arqma_wallet_gui/build/macos/Build/Products/Release/Arqma-Wallet.app"
          bash flutter/arqma_wallet_gui/tool/copy_arqma_tauri_bins.sh "$APP"
          bash build/ci/verify-macos-bundle.sh "$APP"

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Arqma-Wallet.app "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.zip"

      - name: DMG (macOS, drag to Applications)
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          APP="flutter/arqma_wallet_gui/build/macos/Build/Products/Release/Arqma-Wallet.app"
          test -d "$APP"
          STAGING="$(mktemp -d "${TMPDIR:-/tmp}/arqma-wallet-dmg-staging.XXXXXX")"
          cp -R "$APP" "${STAGING}/"
          ln -sf /Applications "${STAGING}/Applications"
          hdiutil create -volname "Arqma Wallet (Flutter)" -srcfolder "${STAGING}" -ov -format UDZO -imagekey zlib-level=9 "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.dmg"
          rm -rf "${STAGING}"
          ls -la "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.dmg"

      - uses: actions/upload-artifact@v6
        with:
          name: Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos
          path: |
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.zip
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-macos.dmg
          retention-days: 30

  flutter-linux:
    name: Linux Flutter bundle
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - name: Checkout repository (public unauthenticated)
        working-directory: ${{ github.workspace }}
        shell: bash
        env:
          CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
        run: |
          set -euo pipefail
          REF="${CHECKOUT_REF}"
          if [[ "${REF}" != refs/heads/* && "${REF}" != refs/tags/* ]]; then
            if git ls-remote --exit-code "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${REF}" >/dev/null 2>&1; then
              REF="refs/tags/${REF}"
            else
              REF="refs/heads/${REF}"
            fi
          fi
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init "${GITHUB_WORKSPACE}"
          git -C "${GITHUB_WORKSPACE}" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "${GITHUB_WORKSPACE}" -c protocol.version=2 fetch --depth 1 origin "${REF}"
          git -C "${GITHUB_WORKSPACE}" checkout -f FETCH_HEAD

      - name: Pubspec version slug (release artifacts)
        id: pubver
        working-directory: ${{ github.workspace }}
        run: |
          LINE=$(grep -m1 '^version:' flutter/arqma_wallet_gui/pubspec.yaml | sed 's/^version:[[:space:]]*//;s/[[:space:]]*$//')
          SAFE=$(echo "$LINE" | tr '+ ' '--')
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"
          echo "VersionSafe=${SAFE}"

      - name: Linux — dependencies (Flutter desktop + wallet_merged)
        working-directory: ${{ github.workspace }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            libgtk-3-dev \
            file \
            desktop-file-utils \
            squashfs-tools
          bash build/ci/install-arqma-depends-linux.sh

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh rust/tool/*.sh || true

      - name: Fetch wallet FFI (ArqTras/FFI, Linux)
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARQMA_FFI_REPO: ArqTras/FFI
          ARQMA_FFI_PLATFORMS: linux-x86_64
        run: bash build/ci/fetch-arqma-wallet-ffi-release-linux.sh

      - name: Fetch arqmad (arqma/arqma latest release)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash build/ci/fetch-arqmad-github-release.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch solo pool sidecar (ArqTras/FFI, Linux)
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARQMA_FFI_REPO: ArqTras/FFI
          ARQMA_SOLO_POOL_PLATFORMS: linux-x86_64
        run: bash build/ci/fetch-arqma-wallet-solo-pool-release-linux.sh

      - name: Install Flutter (pinned)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: bash build/ci/setup-flutter-stable-ci.sh

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Ensure wallet FFI .so in Linux bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          lib="${b}/lib/libarqma_wallet_flutter_ffi.so"
          if test -f "$lib"; then echo "FFI .so already present: $lib"; exit 0; fi
          mkdir -p "${b}/lib"
          SRC="${GITHUB_WORKSPACE}/rust/target/release/libarqma_wallet_flutter_ffi.so"
          test -f "$SRC" || { echo "::error::missing $SRC"; exit 1; }
          cp -f "$SRC" "$lib"
          echo "Copied FFI .so -> $lib"

      - name: Sync arqmad + solo pool into Linux bundle + verify
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          bash flutter/arqma_wallet_gui/tool/bundle_linux_ffi_runtime_libs.sh "$b"
          bash flutter/arqma_wallet_gui/tool/copy_arqma_tauri_bins.sh "$b"
          FAIL_IF_NO_SOLO_POOL=1 bash flutter/arqma_wallet_gui/tool/verify_linux_bundle.sh "$b"

      - name: Tar bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          test -d "$b"
          tar -C "$b" -czf "Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-linux-x64.tar.gz" .

      - name: AppImage (Linux)
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          chmod +x build/ci/flutter-linux-bundle-to-appimage.sh
          bash build/ci/flutter-linux-bundle-to-appimage.sh \
            "flutter/arqma_wallet_gui/build/linux/x64/release/bundle" \
            "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-x86_64.AppImage"

      - uses: actions/upload-artifact@v6
        with:
          name: Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-linux-x64
          path: |
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-linux-x64.tar.gz
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-x86_64.AppImage
          retention-days: 30

  flutter-windows:
    name: Windows Flutter bundle
    runs-on: windows-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - name: Checkout repository (public unauthenticated)
        working-directory: ${{ github.workspace }}
        shell: bash
        env:
          CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
        run: |
          set -euo pipefail
          REF="${CHECKOUT_REF}"
          if [[ "${REF}" != refs/heads/* && "${REF}" != refs/tags/* ]]; then
            if git ls-remote --exit-code "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${REF}" >/dev/null 2>&1; then
              REF="refs/tags/${REF}"
            else
              REF="refs/heads/${REF}"
            fi
          fi
          find "${GITHUB_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init "${GITHUB_WORKSPACE}"
          git -C "${GITHUB_WORKSPACE}" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C "${GITHUB_WORKSPACE}" -c protocol.version=2 fetch --depth 1 origin "${REF}"
          git -C "${GITHUB_WORKSPACE}" checkout -f FETCH_HEAD

      - name: Pubspec version slug (release artifacts)
        id: pubver
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $line = (Select-String -Path "flutter/arqma_wallet_gui/pubspec.yaml" -Pattern '^version:\s*(\S+)').Matches[0].Groups[1].Value
          $safe = $line -replace '\+', '-'
          "safe=$safe" >> $env:GITHUB_OUTPUT
          Write-Host "VersionSafe=$safe"

      - name: MSYS2 / MinGW64 (Windows — Flutter FFI runtime DLLs)
        id: msys2
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: pwsh -NoProfile -File build/ci/setup-msys2-mingw64-windows-ci.ps1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Normalize shell scripts (LF)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          find build/ci rust/tool -name '*.sh' -print0 | xargs -0 sed -i 's/\r$//'
          chmod +x build/ci/*.sh rust/tool/*.sh

      - name: Fetch solo pool sidecar (ArqTras/FFI, Windows)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARQMA_FFI_REPO: ArqTras/FFI
        run: |
          pwsh -NoProfile -File build/ci/fetch-arqma-wallet-solo-pool-release.ps1 -Platforms windows-x86_64-gnu
          $solo = "rust\tauri-app\src-tauri\bin\arqma_flutter_solo_pool.exe"
          if (-not (Test-Path $solo)) { throw "missing $solo after fetch" }

      - name: Fetch wallet FFI (ArqTras/FFI, Windows)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pwsh -NoProfile -File build/ci/fetch-arqma-wallet-ffi-release.ps1 `
            -Platforms windows-x86_64-gnu `
            -SkipJniLibsMirror

      - name: Fetch Arqma arqmad.exe for Flutter bundle (bin — arqmad only)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh -File build/ci/flutter-windows-fetch-arqma-binaries.ps1

      - name: Install Flutter (pinned)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: bash build/ci/setup-flutter-stable-ci.sh

      - run: flutter pub get

      - name: Build Windows
        env:
          ARQMA_WALLET2_MSYS_ROOT: ${{ steps.msys2.outputs.msys2-location }}\mingw64
        run: flutter build windows --release

      - name: Ensure wallet FFI DLL and MinGW runtime under Release/lib
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($root)) { $root = "C:\msys64" }
          $mingwBin = Join-Path $root "mingw64\bin"
          $rel = "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $lib = Join-Path $rel "lib"
          New-Item -Force -ItemType Directory -Path $lib | Out-Null
          $dll = Join-Path $lib "arqma_wallet_flutter_ffi.dll"
          if (-not (Test-Path $dll)) {
            $src = "rust/target/x86_64-pc-windows-gnu/release/arqma_wallet_flutter_ffi.dll"
            if (-not (Test-Path $src)) { throw "missing FFI prebuilt (ArqTras/FFI): $src" }
            Copy-Item -Force $src $dll
            Write-Host "Copied FFI DLL -> $dll"
          } else {
            Write-Host "FFI DLL already present: $dll"
          }
          foreach ($n in @('libgcc_s_seh-1.dll','libstdc++-6.dll','libwinpthread-1.dll')) {
            $src = Join-Path $mingwBin $n
            if (-not (Test-Path $src)) { Write-Host "::warning::missing MinGW runtime: $src"; continue }
            Copy-Item -Force $src $lib
            Write-Host "Copied $n -> $lib"
          }
          # Match flutter/arqma_wallet_gui/windows/cmake/install_arqma_wallet_ffi.cmake.in
          $patterns = @(
            'libboost_*.dll','libcrypto*.dll','libssl*.dll','libsodium*.dll','libhidapi*.dll',
            'libunbound*.dll','libicu*.dll','libldns*.dll','libevent*.dll','libnghttp*.dll',
            'libcares*.dll','libexpat*.dll','libsqlite3*.dll','libgmp*.dll',
            'libzstd*.dll','zlib1.dll','libbz2*.dll','liblzma*.dll','libxml2*.dll','libiconv*.dll',
            'libzmq*.dll','liblmdb*.dll','libunwind*.dll','libreadline*.dll','libhistory*.dll',
            'libtermcap*.dll','libncurses*.dll','libncursesw*.dll','libintl*.dll','libffi*.dll',
            'libssp*.dll','liblz4*.dll','libbrotli*.dll','libdeflate*.dll','libatomic*.dll'
          )
          foreach ($pat in $patterns) {
            Get-ChildItem -Path "$mingwBin\$pat" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch '^libboost_python' -and $_.Name -notmatch '^libboost_numpy' } |
              ForEach-Object { Copy-Item -Force $_.FullName $lib; Write-Host "Copied $($_.Name) -> $lib" }
          }

      - name: Sync daemon into Flutter Release + verify bundle (local script parity)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          node build/copy-to-tauri-bins.js
          $rel = Join-Path $env:GITHUB_WORKSPACE "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          $src = Join-Path $env:GITHUB_WORKSPACE "rust/tauri-app/src-tauri/bin"
          New-Item -Force -ItemType Directory -Path (Join-Path $rel "bin") | Out-Null
          foreach ($e in @("arqmad.exe", "arqma_flutter_solo_pool.exe")) {
            $p = Join-Path $src $e
            if (Test-Path $p) {
              Copy-Item -Force $p (Join-Path $rel "bin/$e")
              Write-Host "Synced $e -> $rel/bin/"
            }
          }
          $verify = Join-Path $env:GITHUB_WORKSPACE "flutter/arqma_wallet_gui/tool/verify_windows_bundle.ps1"
          if (-not (Test-Path $verify)) { throw "missing verify script: $verify (commit flutter/arqma_wallet_gui/tool/verify_windows_bundle.ps1)" }
          pwsh -File $verify -ReleaseDir $rel -FailIfNoArqmad -FailIfNoSoloPool

      - name: Zip Release layout
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $safe = "${{ steps.pubver.outputs.safe }}"
          $zip = Join-Path $env:GITHUB_WORKSPACE "Arqma-Wallet-Flutter-${safe}-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item -Force $zip }
          Compress-Archive -Path (Join-Path $rel "*") -DestinationPath $zip -Force
          Write-Host "Packaged: $zip"

      - name: Inno Setup installer (Windows)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y --no-progress
          $rel = Join-Path $pwd "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $line = (Select-String -Path "flutter/arqma_wallet_gui/pubspec.yaml" -Pattern '^version:\s*(\S+)').Matches[0].Groups[1].Value
          $ver = $line -replace '\+.*',''
          $safe = $line -replace '\+', '-'
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "missing ISCC: $iscc" }
          & $iscc "build\ci\flutter-windows-installer.iss" "/DMyAppVersion=$ver" "/DVersionSafe=$safe" "/DSrcRelease=$rel"
          $setup = Join-Path $pwd "Arqma-Wallet-Flutter-${safe}-windows-x64-Setup.exe"
          if (-not (Test-Path $setup)) { throw "missing $setup" }
          Get-Item $setup | Format-List *

      - uses: actions/upload-artifact@v6
        with:
          name: Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-windows-x64
          path: |
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-windows-x64.zip
            Arqma-Wallet-Flutter-${{ steps.pubver.outputs.safe }}-windows-x64-Setup.exe
          retention-days: 30

  publish-release:
    name: GitHub Release (Flutter)
    needs: [flutter-macos, flutter-linux, flutter-windows]
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          set -eu
          find artifacts -type f | head -200 || true
          echo "---"

      - name: Collect files for GitHub Release
        run: |
          set -eu
          mkdir -p upload
          find artifacts -type f \( \
            -name 'Arqma-Wallet-Flutter-*.zip' \
            -o -name 'Arqma-Wallet-Flutter-*.tar.gz' \
            -o -name 'Arqma-Wallet-Flutter-*.dmg' \
            -o -name 'Arqma-Wallet-Flutter-*.AppImage' \
            -o -name 'Arqma-Wallet-Flutter-*-windows-x64-Setup.exe' \
            \) -exec cp -f {} upload/ \;
          ls -la upload/
          n=$(find upload -type f | wc -l | tr -d ' ')
          if [ "$n" -lt 1 ]; then
            echo "::error::No release files collected from artifacts/"
            find artifacts -type f | head -150 || true
            exit 1
          fi

      # Re-runs replace same-named release assets (zip/dmg/AppImage/Setup.exe) on this tag.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
          name: Arqma Wallet ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: upload/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  repo-private-after-release:
    name: Repository private (optional PAT)
    needs: publish-release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Set repository to private
        env:
          GH_TOKEN: ${{ secrets.ARQMA_REPO_VISIBILITY_PAT }}
        run: |
          set -eu
          if [ -z "${GH_TOKEN:-}" ]; then
            echo '::notice::Secret ARQMA_REPO_VISIBILITY_PAT not set — skipping visibility change. Run: gh repo edit ${{ github.repository }} --visibility private'
            exit 0
          fi
          gh api -X PATCH "repos/${{ github.repository }}" -f visibility=private
          gh repo view "${{ github.repository }}" --json visibility,isPrivate
