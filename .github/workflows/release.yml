# Electron tag releases are disabled — GitHub Releases for `v*` tags are published by
# **Tauri app** (`.github/workflows/tauri-app.yml`, job `tauri-release`).
name: Release (Electron — disabled)

on:
  workflow_dispatch:

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Publishing is Tauri-only
        run: |
          echo "::notice::Push a tag matching v* — the **Tauri app** workflow builds installers and creates/updates the GitHub Release with bundle artifacts."
