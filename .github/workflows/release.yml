# On tag push v*: build all platforms, create/update release here, and add wallet binaries to arqma/arqma latest release.
# - This repo (Arqma-GUI-MM): release for the tag is created or updated; existing assets are replaced.
# - github.com/arqma/arqma: wallet binaries are uploaded to that repo's latest release (requires ARQMA_REPO_TOKEN).
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.17.0"

      - run: npm install -g npm@latest

      - name: Patch node gyp (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: npm install -g node-gyp

      - name: Install dependencies
        run: npm i --force
        env:
          npm_config_registry: https://registry.npmjs.org/
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Download Arqma binaries
        run: node ./build/download-binaries.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Linux binaries
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -xvf ${{ github.workspace }}/downloads/latest.gz --directory ${{ github.workspace }}
          ls ${{ github.workspace }}/bin

      - name: Extract Windows binaries
        if: matrix.os == 'windows-latest'
        run: |
          mkdir ${{ github.workspace }}\bin
          tar -xvf ${{ github.workspace }}\downloads\latest.zip -C ${{ github.workspace }}\bin
          dir ${{ github.workspace }}\bin

      - name: Extract macOS binaries
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p bin
          unzip -o downloads/latest.zip -d bin
          ls -la bin

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: npm run build-mac-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npm run build-windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: dist/electron/Packaged/
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release files
        id: release_files
        run: |
          mkdir -p release-files
          find artifacts -type f -name "Arqma-Wallet.*.*.*" ! -name "*.blockmap" -exec cp {} release-files/ \;
          COUNT=$(find release-files -type f | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT binaries"
          ls -la release-files/
          if [ "$COUNT" -eq 0 ]; then echo "::error::No build artifacts found"; exit 1; fi

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Arqma Wallet ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            Fix for macOS build (renderer Buffer resolution and CI).

            If this release already existed, existing assets have been replaced with new binaries.
          replace_assets: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Add wallet binaries to the latest release on github.com/arqma/arqma.
  # Requires repo secret ARQMA_REPO_TOKEN (PAT with repo scope for arqma/arqma).
  # Note: Cannot use secrets in job-level "if" (GitHub does not allow it).
  release-arqma-upstream:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get latest release from arqma/arqma
        id: arqma_release
        run: |
          RESP=$(curl -sS -H "Authorization: token ${{ secrets.ARQMA_REPO_TOKEN }}" \
            "https://api.github.com/repos/arqma/arqma/releases/latest")
          echo "upload_url=$(echo "$RESP" | jq -r '.upload_url | split("{")[0]')" >> $GITHUB_OUTPUT
          echo "tag_name=$(echo "$RESP" | jq -r '.tag_name')" >> $GITHUB_OUTPUT
          echo "Release: $(echo "$RESP" | jq -r '.tag_name')"

      - name: Upload wallet binaries to arqma/arqma latest release
        env:
          ARQMA_REPO_TOKEN: ${{ secrets.ARQMA_REPO_TOKEN }}
          UPLOAD_URL: ${{ steps.arqma_release.outputs.upload_url }}
        run: |
          set -e
          find artifacts -type f -name "Arqma-Wallet.*.*.*" ! -name "*.blockmap" | while read -r f; do
            name=$(basename "$f")
            echo "Uploading $name to arqma/arqma latest release..."
            curl -sS -f -X POST \
              -H "Authorization: token $ARQMA_REPO_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" \
              "$UPLOAD_URL?name=$name"
            echo ""
          done
          echo "Done uploading wallet binaries to github.com/arqma/arqma latest release."
