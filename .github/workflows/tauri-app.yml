# Build Arqma Wallet (Tauri) installers — Windows, Linux, macOS. Version: package.json / tauri.conf / Rust workspace.
name: Tauri app

on:
  push:
    paths:
      - "rust/**"
      - "build/copy-to-tauri-bins.js"
      - "build/download-binaries.js"
      - "rust/tauri-app/scripts/pack-linux-tarball.sh"
      - "rust/README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/tauri-app.yml"
  pull_request:
    paths:
      - "rust/**"
      - "build/copy-to-tauri-bins.js"
      - "rust/tauri-app/scripts/pack-linux-tarball.sh"
      - "rust/README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/tauri-app.yml"
  workflow_dispatch:

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Linux — Install Tauri dependencies (WebKit, etc.)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl

      - name: Download Arqma binaries (daemon / wallet-rpc)
        run: node ./build/download-binaries.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -xvf "${{ github.workspace }}/downloads/latest.gz" --directory "${{ github.workspace }}"
          ls -la "${{ github.workspace }}/bin" || true

      - name: Extract archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\bin" | Out-Null
          tar -xvf "${{ github.workspace }}\downloads\latest.zip" -C "${{ github.workspace }}\bin"
          Get-ChildItem "${{ github.workspace }}\bin"

      - name: Rozpakuj (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p bin
          unzip -o downloads/latest.zip -d bin
          ls -la bin

      - name: Copy binaries into src-tauri/bin
        run: node build/copy-to-tauri-bins.js

      - name: npm install + Vite + tauri build
        working-directory: rust/tauri-app
        run: |
          npm install
          npm run ci:tauri
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Linux — Create tar.gz (binary + resources, no RPM/.deb)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust/tauri-app
        run: bash scripts/pack-linux-tarball.sh

      # Linux: large .AppImage (bundled WebKitGTK) plus a smaller .tar.gz of the release binary + resources.
      # Windows/macOS: NSIS/MSI or app/dmg — artifact sizes differ mainly because of AppImage bundling.
      - name: Upload Tauri bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Tauri-bundle-${{ matrix.os }}
          path: |
            rust/target/release/bundle/
          if-no-files-found: ignore
