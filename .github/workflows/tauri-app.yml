# Budowa instalatorów Arqma Wallet (Tauri) — Windows, Linux, macOS. Wersja w package.json / tauri.conf / workspace Rust.
name: Tauri app

on:
  push:
    paths:
      - "rust/**"
      - "build/copy-to-tauri-bins.js"
      - "build/download-binaries.js"
      - ".github/workflows/tauri-app.yml"
  pull_request:
    paths:
      - "rust/**"
      - "build/copy-to-tauri-bins.js"
      - ".github/workflows/tauri-app.yml"
  workflow_dispatch:

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.17.0"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Linux — zależności Tauri (WebKit, itp.)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl

      - name: Pobierz binaria Arqma (demon / wallet-rpc)
        run: node ./build/download-binaries.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rozpakuj (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -xvf "${{ github.workspace }}/downloads/latest.gz" --directory "${{ github.workspace }}"
          ls -la "${{ github.workspace }}/bin" || true

      - name: Rozpakuj (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\bin" | Out-Null
          tar -xvf "${{ github.workspace }}\downloads\latest.zip" -C "${{ github.workspace }}\bin"
          Get-ChildItem "${{ github.workspace }}\bin"

      - name: Rozpakuj (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p bin
          unzip -o downloads/latest.zip -d bin
          ls -la bin

      - name: Skopiuj binaria do src-tauri/bin
        run: node build/copy-to-tauri-bins.js

      - name: npm install + Vite + tauri build
        working-directory: rust/tauri-app
        run: |
          npm install
          npm run ci:tauri
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefaktów Tauri
        uses: actions/upload-artifact@v4
        with:
          name: Tauri-bundle-${{ matrix.os }}
          path: |
            rust/target/release/bundle/
          if-no-files-found: ignore
