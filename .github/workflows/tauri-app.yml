# Build Arqma Wallet (Tauri) installers — Windows, Linux, macOS. Version: package.json / tauri.conf / Rust workspace.
name: Tauri app

on:
  push:
    tags:
      - "v*"
    paths:
      - "rust/**"
      - "build/copy-to-tauri-bins.js"
      - "build/download-binaries.js"
      - "rust/README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/tauri-app.yml"
  pull_request:
    paths:
      - "rust/**"
      - "build/copy-to-tauri-bins.js"
      - "rust/README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/tauri-app.yml"
  workflow_dispatch:

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Linux — Install Tauri dependencies (WebKit, etc.)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl

      - name: Download Arqma binaries (daemon / wallet-rpc)
        run: node ./build/download-binaries.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -xvf "${{ github.workspace }}/downloads/latest.gz" --directory "${{ github.workspace }}"
          ls -la "${{ github.workspace }}/bin" || true

      - name: Extract archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\bin" | Out-Null
          tar -xvf "${{ github.workspace }}\downloads\latest.zip" -C "${{ github.workspace }}\bin"
          Get-ChildItem "${{ github.workspace }}\bin"

      - name: Rozpakuj (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p bin
          unzip -o downloads/latest.zip -d bin
          ls -la bin

      - name: Copy binaries into src-tauri/bin
        run: node build/copy-to-tauri-bins.js

      - name: npm install + Vite + tauri build
        working-directory: rust/tauri-app
        run: |
          npm install
          npm run ci:tauri
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Tauri bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Tauri-bundle-${{ matrix.os }}
          path: |
            rust/target/release/bundle/**/*.AppImage
            rust/target/release/bundle/**/*.deb
            rust/target/release/bundle/**/*.snap
            rust/target/release/bundle/**/Arqma Wallet*.exe
            rust/target/release/bundle/**/*.msi
            rust/target/release/bundle/**/*.dmg
            rust/target/release/bundle/**/*.app.tar.gz
          if-no-files-found: ignore

  # Tag `v*` only: attach all matrix bundle artifacts to the GitHub Release (Tauri-only publishing).
  tauri-release:
    name: GitHub Release (Tauri)
    needs: tauri
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Tauri bundle artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.AppImage" -o -name "*.deb" -o -name "*.snap" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
            -o -name "*.tar.gz" \
            \) -exec cp -f {} release-files/ \;
          COUNT=$(find release-files -type f | wc -l | tr -d ' ')
          echo "Collected $COUNT asset(s)"
          ls -la release-files/
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No Tauri bundle files found (check bundle paths / matrix uploads)"
            exit 1
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Arqma-Wallet ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
