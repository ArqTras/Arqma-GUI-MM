# On version tags `v*`: build Flutter desktop (macOS / Linux / Windows) with native FFI chain,
# then attach zip / tar.gz / dmg / AppImage / Windows Setup.exe to the GitHub Release for that tag.
name: Flutter GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. v5.0.5) — must exist on the remote"
        required: true
        default: "v5.0.5"
        type: string

permissions:
  contents: read

concurrency:
  group: flutter-github-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ARQMA_WALLET2_UPSTREAM_DIR: ${{ github.workspace }}/rust/arqma-rpc-upstream

jobs:
  macos:
    name: macOS Flutter bundle
    runs-on: macos-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-release-macos

      - uses: dtolnay/rust-toolchain@stable

      - name: macOS — Homebrew (Arqma / wallet FFI)
        working-directory: ${{ github.workspace }}
        run: |
          brew install cmake pkg-config boost openssl libsodium zeromq unbound readline hidapi icu4c lmdb xz 2>/dev/null || true

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (macOS)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-macos.sh

      - name: Build Arqma daemon (arqmad) and copy to Tauri bin
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-daemon-copy.sh

      - name: cargo build — arqma-wallet-flutter-ffi (release)
        working-directory: rust
        run: cargo build -p arqma-wallet-flutter-ffi --release

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Ensure wallet FFI dylib in macOS app bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          APP="flutter/arqma_wallet_gui/build/macos/Build/Products/Release/Arqma-Wallet.app"
          FW="${APP}/Contents/Frameworks"
          DY="${FW}/libarqma_wallet_flutter_ffi.dylib"
          if test -f "$DY"; then echo "FFI dylib already present: $DY"; exit 0; fi
          mkdir -p "$FW"
          SRC="${GITHUB_WORKSPACE}/rust/target/release/libarqma_wallet_flutter_ffi.dylib"
          test -f "$SRC" || { echo "::error::missing $SRC (cargo build arqma-wallet-flutter-ffi)"; exit 1; }
          cp -f "$SRC" "$DY"
          echo "Copied FFI dylib -> $DY"

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Arqma-Wallet.app "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-macos.zip"

      - name: DMG (macOS)
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          APP="flutter/arqma_wallet_gui/build/macos/Build/Products/Release/Arqma-Wallet.app"
          test -d "$APP"
          hdiutil create -volname "Arqma Wallet (Flutter)" -srcfolder "$APP" -ov -format UDZO "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-macos.dmg"
          ls -la "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: Arqma-Wallet-Flutter-macos
          path: |
            Arqma-Wallet-Flutter-macos.zip
            Arqma-Wallet-Flutter-macos.dmg
          retention-days: 30

  linux:
    name: Linux Flutter bundle
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-release-linux

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux — dependencies (Arqma + Flutter desktop)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            libgtk-3-dev \
            liblzma-dev \
            libboost-all-dev \
            libssl-dev \
            libzmq3-dev \
            libsodium-dev \
            libhidapi-dev \
            libunbound-dev \
            libreadline-dev \
            liblmdb-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            libicu-dev \
            file \
            desktop-file-utils \
            squashfs-tools

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (Linux)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-linux.sh

      - name: Build Arqma daemon (arqmad) and copy to Tauri bin
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-daemon-copy.sh

      - name: cargo build — arqma-wallet-flutter-ffi (release)
        working-directory: rust
        run: cargo build -p arqma-wallet-flutter-ffi --release

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Ensure wallet FFI .so in Linux bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          lib="${b}/lib/libarqma_wallet_flutter_ffi.so"
          if test -f "$lib"; then echo "FFI .so already present: $lib"; exit 0; fi
          mkdir -p "${b}/lib"
          SRC="${GITHUB_WORKSPACE}/rust/target/release/libarqma_wallet_flutter_ffi.so"
          test -f "$SRC" || { echo "::error::missing $SRC"; exit 1; }
          cp -f "$SRC" "$lib"
          echo "Copied FFI .so -> $lib"

      - name: Tar bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          test -d "$b"
          tar -C "$b" -czf Arqma-Wallet-Flutter-linux-x64.tar.gz .

      - name: AppImage (Linux)
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          chmod +x build/ci/flutter-linux-bundle-to-appimage.sh
          bash build/ci/flutter-linux-bundle-to-appimage.sh \
            "flutter/arqma_wallet_gui/build/linux/x64/release/bundle" \
            "${GITHUB_WORKSPACE}/Arqma-Wallet-Flutter-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: Arqma-Wallet-Flutter-linux-x64
          path: |
            Arqma-Wallet-Flutter-linux-x64.tar.gz
            Arqma-Wallet-Flutter-x86_64.AppImage
          retention-days: 30

  windows:
    name: Windows Flutter bundle
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-release-windows

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust GNU target (Windows)
        run: rustup target add x86_64-pc-windows-gnu

      - name: MSYS2 / MinGW64 (Windows)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-hidapi
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-unbound
            mingw-w64-x86_64-lmdb
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libunwind
            git

      - name: Export Node directory for MSYS2 (Windows)
        shell: pwsh
        run: |
          $dir = Split-Path -Parent (Get-Command node).Source
          Add-Content -Path $env:GITHUB_ENV -Value "ARQMA_CI_WINDOWS_NODE_DIR=$dir"

      - name: Make CI scripts executable
        shell: bash
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (Windows MinGW)
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}
        run: |
          export ARQMA_WALLET2_UPSTREAM_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/rust/arqma-rpc-upstream"
          bash "$(cygpath -u "$GITHUB_WORKSPACE")/build/ci/build-arqma-mingw.sh"

      - name: Fetch Arqma arqmad.exe for Flutter bundle (bin — arqmad only)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh -File build/ci/flutter-windows-fetch-arqma-binaries.ps1

      - name: cargo build — arqma-wallet-flutter-ffi (Windows GNU)
        working-directory: rust
        shell: pwsh
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
        run: |
          $root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($root)) { $root = "C:\msys64" }
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          $env:Path = "$nodeDir;$root\mingw64\bin;$root\usr\bin;" + $env:Path
          $env:ARQMA_WALLET2_MSYS_ROOT = "$root\mingw64"
          $env:ARQMA_MINGW_BIN = "$root\mingw64\bin"
          $env:ARQMA_WALLET2_UPSTREAM_DIR = "${{ github.workspace }}\rust\arqma-rpc-upstream"
          cargo build -p arqma-wallet-flutter-ffi --release --target x86_64-pc-windows-gnu

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Ensure wallet FFI DLL and MinGW runtime next to Windows bundle
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($root)) { $root = "C:\msys64" }
          $mingwBin = Join-Path $root "mingw64\bin"
          $rel = "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $dll = Join-Path $rel "arqma_wallet_flutter_ffi.dll"
          if (-not (Test-Path $dll)) {
            $src = "rust/target/x86_64-pc-windows-gnu/release/arqma_wallet_flutter_ffi.dll"
            if (-not (Test-Path $src)) { throw "missing FFI build output: $src" }
            Copy-Item -Force $src $dll
            Write-Host "Copied FFI DLL -> $dll"
          } else {
            Write-Host "FFI DLL already present: $dll"
          }
          foreach ($n in @('libgcc_s_seh-1.dll','libstdc++-6.dll','libwinpthread-1.dll')) {
            $src = Join-Path $mingwBin $n
            if (-not (Test-Path $src)) { Write-Host "::warning::missing MinGW runtime: $src"; continue }
            Copy-Item -Force $src $rel
            Write-Host "Copied $n -> $rel"
          }

      - name: Zip Release layout
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $zip = Join-Path $env:GITHUB_WORKSPACE "Arqma-Wallet-Flutter-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item -Force $zip }
          Compress-Archive -Path (Join-Path $rel "*") -DestinationPath $zip -Force
          Write-Host "Packaged: $zip"

      - name: Inno Setup installer (Windows)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y --no-progress
          $rel = Join-Path $pwd "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $line = (Select-String -Path "flutter/arqma_wallet_gui/pubspec.yaml" -Pattern '^version:\s*(\S+)').Matches[0].Groups[1].Value
          $ver = $line -replace '\+.*',''
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "missing ISCC: $iscc" }
          & $iscc "build\ci\flutter-windows-installer.iss" "/DMyAppVersion=$ver" "/DSrcRelease=$rel"
          $setup = Join-Path $pwd "Arqma-Wallet-Flutter-windows-x64-Setup.exe"
          if (-not (Test-Path $setup)) { throw "missing $setup" }
          Get-Item $setup | Format-List *

      - uses: actions/upload-artifact@v4
        with:
          name: Arqma-Wallet-Flutter-windows-x64
          path: |
            Arqma-Wallet-Flutter-windows-x64.zip
            Arqma-Wallet-Flutter-windows-x64-Setup.exe
          retention-days: 30

  publish-flutter-assets:
    name: Attach Flutter bundles to GitHub Release
    needs: [macos, linux, windows]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: flutter-bundles
          pattern: Arqma-Wallet-Flutter-*
          merge-multiple: true

      - name: Collect files for upload
        run: |
          set -eu
          mkdir -p upload
          find flutter-bundles -type f \( \
            -name '*.zip' -o -name '*.tar.gz' -o -name '*.dmg' \
            -o -name '*.AppImage' -o -name 'Arqma-Wallet-Flutter-windows-x64-Setup.exe' \
            \) -exec cp -f {} upload/ \;
          ls -la upload/
          n=$(find upload -type f | wc -l | tr -d ' ')
          if [ "$n" -lt 1 ]; then
            echo "::error::No Flutter bundle files found under flutter-bundles"
            find . -type f | head -100 || true
            exit 1
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
          files: upload/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
