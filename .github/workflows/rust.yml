# Rust workspace — compile check and Clippy (core, daemon, Tauri).
name: Rust

on:
  push:
    branches: [main, dev, norpc]
    paths:
      - "rust/**"
      - "rust/README.md"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main, dev, norpc]
    paths:
      - "rust/**"
      - "rust/README.md"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Linux — Install Tauri link libraries (WebKit)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Ensure Tauri dist placeholder (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p tauri-app/dist
          if [ ! -f tauri-app/dist/index.html ]; then
            printf '%s\n' '<!doctype html><html><body>CI placeholder</body></html>' > tauri-app/dist/index.html
          fi

      - name: Ensure Tauri dist placeholder (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "tauri-app/dist" | Out-Null
          if (-not (Test-Path "tauri-app/dist/index.html")) {
            '<!doctype html><html><body>CI placeholder</body></html>' | Out-File -FilePath "tauri-app/dist/index.html" -Encoding utf8
          }

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets
