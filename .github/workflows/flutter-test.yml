# Run Flutter analyze + unit tests for desktop, mobile (iOS tree), and Android.
# iOS build/signing stays manual — no macOS runner job here.
name: Flutter test

on:
  push:
    branches:
      - main
      - review
    paths:
      - "flutter/**"
      - "flutter-mobile/**"
      - "flutter-android/**"
      - ".github/workflows/flutter-test.yml"
  pull_request:
    paths:
      - "flutter/**"
      - "flutter-mobile/**"
      - "flutter-android/**"
      - ".github/workflows/flutter-test.yml"

permissions:
  contents: read

concurrency:
  group: flutter-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-unit-tests:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Desktop
            working-directory: flutter/arqma_wallet_gui
          - label: Mobile (iOS tree)
            working-directory: flutter-mobile/arqma_wallet_mobile
          - label: Android
            working-directory: flutter-android/arqma_wallet_android
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter (pinned)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/setup-flutter-stable-ci.sh

      - run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        run: flutter test
