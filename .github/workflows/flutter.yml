# Flutter GUI — verify analyze, tests, and a desktop build on branch `flutter`.
# Does not upload artifacts, attach binaries to releases, or publish packages.
name: Flutter GUI

on:
  push:
    branches:
      - flutter
    paths:
      - "flutter/**"
      - ".github/workflows/flutter.yml"
      - "build/ci/**"
      - "rust/arqma-wallet-flutter-ffi/**"
      - "rust/tauri-app/src-tauri/Cargo.toml"
      - "rust/tauri-app/src-tauri/src/bin/arqma_flutter_solo_pool.rs"
      - "rust/tauri-app/src-tauri/src/solo_pool.rs"
      - "rust/tauri-app/src-tauri/src/solo_pool_sink.rs"
      - "rust/tauri-app/src-tauri/src/lib.rs"
  pull_request:
    branches:
      - flutter
    paths:
      - "flutter/**"
      - ".github/workflows/flutter.yml"
      - "build/ci/**"
      - "rust/arqma-wallet-flutter-ffi/**"
      - "rust/tauri-app/src-tauri/Cargo.toml"
      - "rust/tauri-app/src-tauri/src/bin/arqma_flutter_solo_pool.rs"
      - "rust/tauri-app/src-tauri/src/solo_pool.rs"
      - "rust/tauri-app/src-tauri/src/solo_pool_sink.rs"
      - "rust/tauri-app/src-tauri/src/lib.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: flutter/arqma_wallet_gui

jobs:
  analyze-and-test:
    name: Analyze and test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      # Fail only on analyzer *errors*; warnings/infos still print (repo has known lints).
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

  build-macos:
    name: Build macOS (no artifacts)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Cargo (workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-gui-macos-ffi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: macOS — Homebrew (Arqma / wallet FFI)
        working-directory: ${{ github.workspace }}
        run: |
          brew install cmake pkg-config boost openssl libsodium zeromq unbound readline hidapi icu4c lmdb xz 2>/dev/null || true

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (macOS)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-macos.sh

      - name: cargo build — arqma-wallet-flutter-ffi (release)
        working-directory: rust
        run: cargo build -p arqma-wallet-flutter-ffi --release

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release
