# Snap Store upload was tied to Electron builds on tag `v*`. Tag releases are now Tauri-only
# (see `tauri-app.yml`). Run this workflow manually when you need to publish an Electron snap.
name: Publish Snap

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap
        run: npm run build -- -T linux -A x64

      - name: Upload Snap to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: snapcraft upload dist/electron/Packaged/*.snap --release stable
