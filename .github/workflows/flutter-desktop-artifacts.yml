# Full Flutter desktop release builds with downloadable artifacts (Windows / Linux / macOS).
# Native chain: Arqma upstream clone + wallet_merged + arqma-wallet-flutter-ffi, then `flutter build`.
name: Flutter desktop artifacts

on:
  push:
    branches: [flutter]
    paths:
      - ".github/workflows/flutter-desktop-artifacts.yml"
      - "build/ci/**"
      - "rust/arqma-wallet-flutter-ffi/**"
      - "flutter/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-desktop-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  ARQMA_WALLET2_UPSTREAM_DIR: ${{ github.workspace }}/rust/arqma-rpc-upstream

jobs:
  macos:
    name: macOS bundle (artifact)
    runs-on: macos-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-artifacts-macos

      - uses: dtolnay/rust-toolchain@stable

      - name: macOS — Homebrew (Arqma / wallet FFI)
        working-directory: ${{ github.workspace }}
        run: |
          brew install cmake pkg-config boost openssl libsodium zeromq unbound readline hidapi icu4c lmdb xz 2>/dev/null || true

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (macOS)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-macos.sh

      - name: cargo build — arqma-wallet-flutter-ffi (release)
        working-directory: rust
        run: cargo build -p arqma-wallet-flutter-ffi --release

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Arqma-Wallet.app "${GITHUB_WORKSPACE}/Arqma-Wallet-macos.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Arqma-Wallet-macos
          path: Arqma-Wallet-macos.zip
          retention-days: 14

  linux:
    name: Linux bundle (artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-artifacts-linux

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux — dependencies (Arqma + Flutter desktop)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            libgtk-3-dev \
            liblzma-dev \
            libboost-all-dev \
            libssl-dev \
            libzmq3-dev \
            libsodium-dev \
            libhidapi-dev \
            libunbound-dev \
            libreadline-dev \
            liblmdb-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            libicu-dev

      - name: Make CI scripts executable
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (Linux)
        working-directory: ${{ github.workspace }}
        run: bash build/ci/build-arqma-linux.sh

      - name: cargo build — arqma-wallet-flutter-ffi (release)
        working-directory: rust
        run: cargo build -p arqma-wallet-flutter-ffi --release

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Tar bundle
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          b="flutter/arqma_wallet_gui/build/linux/x64/release/bundle"
          test -d "$b"
          tar -C "$b" -czf Arqma-Wallet-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: Arqma-Wallet-linux-x64
          path: Arqma-Wallet-linux-x64.tar.gz
          retention-days: 14

  windows:
    name: Windows bundle (artifact)
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: flutter/arqma_wallet_gui
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: flutter-artifacts-windows

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust GNU target (Windows)
        run: rustup target add x86_64-pc-windows-gnu

      - name: MSYS2 / MinGW64 (Windows)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-hidapi
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-unbound
            mingw-w64-x86_64-lmdb
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libunwind
            git

      - name: Export Node directory for MSYS2 (Windows)
        shell: pwsh
        run: |
          $dir = Split-Path -Parent (Get-Command node).Source
          Add-Content -Path $env:GITHUB_ENV -Value "ARQMA_CI_WINDOWS_NODE_DIR=$dir"

      - name: Make CI scripts executable
        shell: bash
        working-directory: ${{ github.workspace }}
        run: chmod +x build/ci/*.sh || true

      - name: Clone Arqma upstream (pospow)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: bash build/ci/clone-arqma.sh
        env:
          ARQMA_UPSTREAM_REPO: https://github.com/arqtras/arqma.git
          ARQMA_UPSTREAM_REF: pospow

      - name: Build Arqma wallet_merged (Windows MinGW)
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}
        run: |
          export ARQMA_WALLET2_UPSTREAM_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/rust/arqma-rpc-upstream"
          bash "$(cygpath -u "$GITHUB_WORKSPACE")/build/ci/build-arqma-mingw.sh"

      - name: cargo build — arqma-wallet-flutter-ffi (Windows GNU)
        working-directory: rust
        shell: pwsh
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
        run: |
          $root = "${{ steps.msys2.outputs.msys2-location }}"
          if ([string]::IsNullOrWhiteSpace($root)) { $root = "C:\msys64" }
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          $env:Path = "$nodeDir;$root\mingw64\bin;$root\usr\bin;" + $env:Path
          $env:ARQMA_WALLET2_MSYS_ROOT = "$root\mingw64"
          $env:ARQMA_MINGW_BIN = "$root\mingw64\bin"
          $env:ARQMA_WALLET2_UPSTREAM_DIR = "${{ github.workspace }}\rust\arqma-rpc-upstream"
          cargo build -p arqma-wallet-flutter-ffi --release --target x86_64-pc-windows-gnu

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Release layout
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "flutter/arqma_wallet_gui/build/windows/x64/runner/Release"
          if (-not (Test-Path $rel)) { throw "missing $rel" }
          $zip = Join-Path $env:GITHUB_WORKSPACE "Arqma-Wallet-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item -Force $zip }
          Compress-Archive -Path (Join-Path $rel "*") -DestinationPath $zip -Force
          Write-Host "Packaged: $zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Arqma-Wallet-windows-x64
          path: Arqma-Wallet-windows-x64.zip
          retention-days: 14
