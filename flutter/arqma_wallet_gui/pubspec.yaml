name: arqma_wallet_gui
description: Arqma desktop wallet — Flutter shell matching the Vue + Quasar + Tauri UI.
publish_to: "none"
version: 5.1.1+5

environment:
  sdk: ">=3.11.0 <4.0.0"
  # Lower bound = `build/ci/flutter-version` (CI + recommended local SDK for all desktop OS).
  flutter: ">=3.41.9"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^17.3.0
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  timeago: ^3.6.1
  file_picker: ^10.3.8
  crypto: ^3.0.6
  ffi: ^2.1.3
  qr: ^3.0.2
  qr_flutter: ^4.1.0
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/arq_logo_with_padding.png
    - assets/branding/app_icon.png
    - assets/locales/
