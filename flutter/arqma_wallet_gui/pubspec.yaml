name: arqma_wallet_gui
description: Arqma desktop wallet — Flutter shell matching the Vue + Quasar + Tauri UI.
publish_to: "none"
version: 5.0.3+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.6.2
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  timeago: ^3.6.1
  file_picker: ^8.1.4
  crypto: ^3.0.6
  ffi: ^2.1.3
  qr: ^3.0.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/arq_logo_with_padding.png
    - assets/branding/app_icon.png
    - assets/locales/
